<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="760" viewBox="0 0 1600 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SHawn Ecosystem — Premium System Map</title>
  <desc id="desc">Premium visual banner for SHawn GitHub profile</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="30%" stop-color="#0f172a"/>
      <stop offset="65%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>

    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0b1220" stop-opacity="0.86"/>
    </linearGradient>

    <radialGradient id="halo" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.33"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.0"/>
    </radialGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.5"/>
    </linearGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>

    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <rect width="36" height="36" fill="none"/>
      <path d="M0 35.5 H36 M35.5 0 V36" stroke="#1f2937" stroke-width="0.4"/>
      <circle cx="0.3" cy="0.3" r="0.6" fill="#1f2937"/>
    </pattern>

    <style>
      .title { font: 700 60px/1.1 "Inter", "Segoe UI", Arial, sans-serif; fill: #f8fafc; letter-spacing: 0.8px; }
      .subtitle { font: 500 24px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #bae6fd; }
      .small { font: 500 20px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #cbd5e1; }
      .metric { font: 700 28px/1.1 "Inter", "Segoe UI", Arial, sans-serif; fill: #f8fafc; }
      .metricLbl { font: 500 16px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #94a3b8; }
      .nodeTitle { font: 600 26px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #e2e8f0; text-anchor: middle; }
      .nodeBody { font: 500 16px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #cbd5e1; text-anchor: middle; }
      .tag { font: 600 15px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #e2e8f0; text-anchor: middle; }
      .kicker { font: 600 18px/1.2 "Inter", "Segoe UI", Arial, sans-serif; fill: #e2e8f0; letter-spacing: 2px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="760" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="760" fill="url(#grid)"/>
  <rect x="80" y="36" width="1440" height="688" fill="url(#halo)" rx="28"/>

  <!-- frame -->
  <rect x="90" y="52" width="1420" height="656" rx="24" fill="none" stroke="url(#accent)" stroke-width="1.2" opacity="0.75"/>

  <!-- top bars -->
  <rect x="140" y="84" width="1320" height="2" fill="#334155" opacity="0.55"/>
  <rect x="140" y="94" width="1320" height="2" fill="#334155" opacity="0.35"/>

  <text x="140" y="84" class="kicker">SHAWN ECOSYSTEM</text>
  <text x="140" y="170" class="title">Private-first · Public-first balance</text>
  <text x="140" y="208" class="subtitle">Research / Personal Operations / Growth Content</text>

  <!-- metric chips -->
  <g transform="translate(140 238)">
    <rect x="0" y="0" width="220" height="72" rx="16" fill="url(#panel)" stroke="#3b82f6" stroke-opacity="0.5"/>
    <text x="110" y="34" class="metric" fill="#60a5fa">3 private engines</text>
    <text x="110" y="58" class="metricLbl">SH, SHio, SHide</text>

    <rect x="236" y="0" width="240" height="72" rx="16" fill="url(#panel)" stroke="#22d3ee" stroke-opacity="0.5"/>
    <text x="356" y="34" class="metric" fill="#67e8f9">Public-safe</text>
    <text x="356" y="58" class="metricLbl">open-source boundary design</text>

    <rect x="492" y="0" width="220" height="72" rx="16" fill="url(#panel)" stroke="#a78bfa" stroke-opacity="0.5"/>
    <text x="602" y="34" class="metric" fill="#c4b5fd">8 public repos</text>
    <text x="602" y="58" class="metricLbl">for external collaboration</text>

    <rect x="732" y="0" width="246" height="72" rx="16" fill="url(#panel)" stroke="#fbbf24" stroke-opacity="0.5"/>
    <text x="855" y="34" class="metric" fill="#fcd34d">Mermaid + visual map</text>
    <text x="855" y="58" class="metricLbl">for quick ecosystem onboarding</text>
  </g>

  <!-- central architecture -->
  <g filter="url(#cardShadow)" transform="translate(560 360)">
    <rect x="-240" y="-70" width="480" height="230" rx="26" fill="url(#panel)" stroke="#7dd3fc" stroke-width="1.8"/>
    <ellipse cx="0" cy="0" rx="230" ry="74" fill="#0ea5e90a"/>
    <text x="0" y="-20" class="nodeTitle">SHawn Umbrella</text>
    <text x="0" y="14" class="nodeBody">control plane · policy · boundary governance</text>
    <text x="0" y="42" class="nodeBody">policy-first architecture, not an execution repository</text>
  </g>

  <!-- connections -->
  <g fill="none" stroke="#38bdf8" stroke-width="2.5" opacity="0.85">
    <path d="M800 480 C665 500, 530 520, 420 560"/>
    <path d="M800 480 C800 520, 800 560, 800 620"/>
    <path d="M800 480 C935 500, 1080 520, 1180 560"/>
    <path d="M800 525 C800 560, 800 600, 800 640"/>
  </g>

  <!-- layer cards -->
  <g filter="url(#cardShadow)" transform="translate(120 360)">
    <rect x="0" y="0" width="350" height="190" rx="20" fill="url(#panel)" stroke="#34d399" stroke-width="1.8"/>
    <rect x="20" y="24" width="310" height="56" rx="14" fill="#064e3b" fill-opacity="0.45"/>
    <text x="175" y="45" class="nodeTitle">SH Layer</text>
    <text x="175" y="73" class="nodeBody">Personal life, operations, finance, and career workflows</text>

    <rect x="20" y="92" width="146" height="76" rx="14" fill="#065f46"/>
    <text x="93" y="132" class="tag">SH-sync</text>
    <text x="93" y="154" class="nodeBody">private control plane</text>

    <rect x="182" y="92" width="148" height="76" rx="14" fill="#14532d"/>
    <text x="256" y="132" class="tag">Private domains</text>
    <text x="256" y="154" class="nodeBody">real estate / investment / career</text>
  </g>

  <g filter="url(#cardShadow)" transform="translate(610 360)">
    <rect x="0" y="0" width="380" height="190" rx="20" fill="url(#panel)" stroke="#fbbf24" stroke-width="1.8"/>
    <rect x="22" y="24" width="336" height="56" rx="14" fill="#713f12" fill-opacity="0.42"/>
    <text x="190" y="45" class="nodeTitle">SHio Layer</text>
    <text x="190" y="73" class="nodeBody">Bio research and evidence-first manuscript pipeline</text>

    <rect x="18" y="92" width="110" height="76" rx="13" fill="#7c2d12"/>
    <text x="73" y="132" class="tag">paper-assist</text>
    <text x="73" y="154" class="nodeBody">private</text>

    <rect x="138" y="92" width="106" height="76" rx="13" fill="#92400e"/>
    <text x="191" y="132" class="tag">paper-mapping</text>
    <text x="191" y="154" class="nodeBody">private</text>

    <rect x="260" y="92" width="98" height="76" rx="13" fill="#b45309"/>
    <text x="309" y="132" class="tag">academic</text>
    <text x="309" y="154" class="nodeBody">private</text>
  </g>

  <g filter="url(#cardShadow)" transform="translate(1120 360)">
    <rect x="-320" y="0" width="320" height="190" rx="20" fill="url(#panel)" stroke="#93c5fd" stroke-width="1.8"/>
    <rect x="-300" y="24" width="280" height="56" rx="14" fill="#172554" fill-opacity="0.5"/>
    <text x="-160" y="45" class="nodeTitle">SHide Layer</text>
    <text x="-160" y="73" class="nodeBody">Content distribution & monetization experiments</text>

    <rect x="-300" y="92" width="83" height="76" rx="13" fill="#1d4ed8"/>
    <text x="-259" y="132" class="tag">IG</text>
    <text x="-259" y="154" class="nodeBody">private</text>

    <rect x="-206" y="92" width="83" height="76" rx="13" fill="#1e40af"/>
    <text x="-165" y="132" class="tag">YT</text>
    <text x="-165" y="154" class="nodeBody">private</text>

    <rect x="-112" y="92" width="98" height="76" rx="13" fill="#2563eb"/>
    <text x="-63" y="132" class="tag">BLOG</text>
    <text x="-63" y="154" class="nodeBody">private</text>
  </g>

  <!-- public surface -->
  <g transform="translate(800 650)">
    <rect x="-430" y="-92" width="860" height="86" rx="20" fill="#090f1f" stroke="#fef08a" stroke-width="1.4"/>
    <text x="0" y="-60" text-anchor="middle" class="nodeBody" fill="#fde68a">Public OSS Surface</text>

    <g>
      <rect x="-400" y="-28" width="140" height="52" rx="13" fill="#111827" stroke="#f9a8d4"/>
      <text x="-330" y="3" class="tag">EvidenceMap</text>

      <rect x="-250" y="-28" width="140" height="52" rx="13" fill="#111827" stroke="#c4b5fd"/>
      <text x="-180" y="3" class="tag">SHawn-hwp</text>

      <rect x="-100" y="-28" width="180" height="52" rx="13" fill="#111827" stroke="#93c5fd"/>
      <text x="-10" y="3" class="tag">newbrain-router</text>

      <rect x="95" y="-28" width="160" height="52" rx="13" fill="#111827" stroke="#67e8f9"/>
      <text x="175" y="3" class="tag">docx-qa</text>

      <rect x="270" y="-28" width="110" height="52" rx="13" fill="#111827" stroke="#eab308"/>
      <text x="325" y="3" class="tag">SH-WEB</text>
    </g>
  </g>

  <text x="140" y="730" class="small">Generated visual map · private-first, public-safe architecture</text>

  <circle cx="1400" cy="130" r="8" fill="#67e8f9" filter="url(#neonGlow)"/>
  <circle cx="130" cy="120" r="6" fill="#a78bfa" filter="url(#neonGlow)"/>
  <circle cx="1280" cy="680" r="6" fill="#fbbf24" filter="url(#neonGlow)"/>
  <circle cx="200" cy="680" r="5" fill="#34d399" filter="url(#neonGlow)"/>
</svg>
