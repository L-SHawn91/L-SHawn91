<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="360" viewBox="0 0 1400 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SHawn Open Source Banner</title>
  <desc id="desc">Public-safe hero banner for SHawn GitHub profile</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="35%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#0b1220" stop-opacity="0.86"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M0 32 H32 M32 0 V32" stroke="#1f2937" stroke-opacity="0.5" stroke-width="0.5" />
    </pattern>
    <style>
      .h1{font:700 46px/1.1 'Inter','Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .h2{font:500 20px/1.2 'Inter','Segoe UI',Arial,sans-serif;fill:#bfdbfe}
      .kpi{font:700 26px/1.1 'Inter','Segoe UI',Arial,sans-serif;fill:#f8fafc;text-anchor:middle}
      .kpiSub{font:500 13px/1.1 'Inter','Segoe UI',Arial,sans-serif;fill:#94a3b8;text-anchor:middle}
    </style>
  </defs>

  <rect width="1400" height="360" fill="url(#bg)"/>
  <rect width="1400" height="360" fill="url(#grid)"/>
  <rect x="50" y="34" width="1300" height="292" rx="24" fill="none" stroke="url(#line)" opacity="0.45"/>
  <ellipse cx="220" cy="150" rx="330" ry="150" fill="#38bdf810"/>

  <text x="90" y="120" class="h2">SHAWN · OPEN SOURCE PROFILE</text>
  <text x="90" y="176" class="h1">Research Ops · Document QA · Automation</text>
  <text x="90" y="212" class="h2">공개 오픈소스 산출물 중심의 프로필</text>

  <g transform="translate(90 240)">
    <rect x="0" y="0" width="190" height="64" rx="14" fill="url(#card)" stroke="#60a5fa" stroke-opacity="0.5"/>
    <text x="95" y="28" class="kpi">8 Repos</text>
    <text x="95" y="50" class="kpiSub">Public open source</text>

    <rect x="210" y="0" width="230" height="64" rx="14" fill="url(#card)" stroke="#22d3ee" stroke-opacity="0.5"/>
    <text x="325" y="28" class="kpi">Evidence-first</text>
    <text x="325" y="50" class="kpiSub">Research knowledge infra</text>

    <rect x="460" y="0" width="230" height="64" rx="14" fill="url(#card)" stroke="#a78bfa" stroke-opacity="0.5"/>
    <text x="575" y="28" class="kpi">Composable</text>
    <text x="575" y="50" class="kpiSub">Reusable independent modules</text>
  </g>

  <circle cx="1290" cy="90" r="6" fill="#67e8f9" filter="url(#glow)"/>
  <circle cx="1210" cy="280" r="5" fill="#a78bfa" filter="url(#glow)"/>
</svg>
