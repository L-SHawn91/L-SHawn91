<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="620" viewBox="0 0 1400 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SHawn Ecosystem Architecture</title>
  <desc id="desc">A polished generated map for SHawn profile hero.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0.0"/>
    </radialGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="26"/>
    </filter>

    <style>
      .title { font: 700 46px/1 Arial, Helvetica, sans-serif; fill: #f8fafc; letter-spacing: 0.2px; }
      .sub { font: 500 22px/1 Arial, Helvetica, sans-serif; fill: #bae6fd; }
      .node { font: 600 20px/1.2 Arial, Helvetica, sans-serif; fill: #f8fafc; text-anchor: middle; }
      .small { font: 500 15px/1.2 Arial, Helvetica, sans-serif; fill: #e2e8f0; text-anchor: middle; }
      .chip { font: 600 16px/1.1 Arial, Helvetica, sans-serif; fill: #e0f2fe; text-anchor: middle; }
      .tiny { font: 500 14px/1.2 Arial, Helvetica, sans-serif; fill: #bae6fd; text-anchor: middle; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1400" height="620" fill="url(#bg)"/>
  <rect x="140" y="60" width="1120" height="520" fill="url(#glow)" rx="28"/>

  <!-- soft field -->
  <ellipse cx="700" cy="230" rx="390" ry="210" fill="#0ea5e919" filter="url(#soft)"/>

  <!-- corner accents -->
  <g stroke="#334155" stroke-width="1.2" opacity="0.7">
    <line x1="120" y1="80" x2="220" y2="80"/>
    <line x1="120" y1="80" x2="120" y2="180"/>
    <line x1="1180" y1="80" x2="1280" y2="80"/>
    <line x1="1280" y1="80" x2="1280" y2="180"/>
    <line x1="120" y1="520" x2="220" y2="520"/>
    <line x1="120" y1="520" x2="120" y2="620"/>
    <line x1="1180" y1="520" x2="1280" y2="520"/>
    <line x1="1280" y1="520" x2="1280" y2="620"/>
  </g>

  <!-- title -->
  <text x="700" y="110" text-anchor="middle" class="title">SHawn Ecosystem</text>
  <text x="700" y="146" text-anchor="middle" class="sub">Research + Personal Ops + Content Growth (Public-safe map)</text>

  <!-- connections -->
  <g stroke="#67e8f9" stroke-width="3" opacity="0.55" fill="none">
    <path d="M700 220 C560 250, 420 300, 300 360"/>
    <path d="M700 220 C700 300, 700 320, 700 360"/>
    <path d="M700 220 C840 250, 980 300, 1100 360"/>
    <path d="M700 250 C700 360, 700 390, 700 450"/>
  </g>

  <!-- central hub -->
  <g transform="translate(0 0)">
    <rect x="555" y="165" width="290" height="110" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="3" filter="url(#shadow)"/>
    <text x="700" y="205" class="node">SHawn Umbrella</text>
    <text x="700" y="236" class="small">Policy + architecture + boundary</text>
  </g>

  <!-- Personal / SH -->
  <g>
    <rect x="140" y="330" width="235" height="100" rx="18" fill="#065f46" stroke="#34d399" stroke-width="2.5"/>
    <text x="257" y="370" class="node">SH</text>
    <text x="257" y="395" class="tiny">Personal / Life Control</text>

    <rect x="130" y="455" width="110" height="74" rx="13" fill="#0b422f" stroke="#34d399" stroke-width="2"/>
    <text x="185" y="487" class="tiny">SH-sync</text>

    <rect x="255" y="455" width="175" height="74" rx="13" fill="#14532d" stroke="#34d399" stroke-width="2"/>
    <text x="343" y="487" class="tiny">Private domains</text>
  </g>

  <!-- Research / SHio -->
  <g>
    <rect x="580" y="320" width="238" height="120" rx="18" fill="#7c2d12" stroke="#fbbf24" stroke-width="2.5"/>
    <text x="699" y="362" class="node">SHio</text>
    <text x="699" y="390" class="tiny">Bio-research & manuscript engine</text>

    <rect x="575" y="455" width="120" height="74" rx="13" fill="#7f1d1d" stroke="#f59e0b" stroke-width="2"/>
    <text x="635" y="487" class="tiny">paper-assist</text>

    <rect x="710" y="455" width="120" height="74" rx="13" fill="#92400e" stroke="#f59e0b" stroke-width="2"/>
    <text x="770" y="487" class="tiny">paper-mapping</text>

    <rect x="845" y="455" width="112" height="74" rx="13" fill="#9a3412" stroke="#f59e0b" stroke-width="2"/>
    <text x="901" y="487" class="tiny">academic</text>
  </g>

  <!-- Side / SHide -->
  <g>
    <rect x="1015" y="330" width="235" height="100" rx="18" fill="#1e3a8a" stroke="#93c5fd" stroke-width="2.5"/>
    <text x="1133" y="370" class="node">SHide</text>
    <text x="1133" y="395" class="tiny">Content & Growth</text>

    <rect x="1010" y="455" width="100" height="74" rx="13" fill="#1e40af" stroke="#93c5fd" stroke-width="2"/>
    <text x="1060" y="487" class="tiny">IG</text>

    <rect x="1115" y="455" width="100" height="74" rx="13" fill="#1d4ed8" stroke="#93c5fd" stroke-width="2"/>
    <text x="1165" y="487" class="tiny">YT</text>

    <rect x="1220" y="455" width="100" height="74" rx="13" fill="#1e3a8a" stroke="#93c5fd" stroke-width="2"/>
    <text x="1270" y="487" class="tiny">BLOG</text>
  </g>

  <!-- Public OSS surface -->
  <rect x="495" y="520" width="420" height="110" rx="16" fill="#0b1220" stroke="#eab308" stroke-width="2.2"/>
  <text x="705" y="553" class="node">Public OSS Surface</text>
  <g transform="translate(525,566)">
    <rect width="90" height="38" rx="9" fill="#172554" stroke="#cbd5e1"/>
    <text x="45" y="25" class="tiny">EvidenceMap</text>
    <rect x="95" y="0" width="90" height="38" rx="9" fill="#172554" stroke="#cbd5e1"/>
    <text x="140" y="25" class="tiny">shawn-hwp</text>
    <rect x="190" y="0" width="90" height="38" rx="9" fill="#172554" stroke="#cbd5e1"/>
    <text x="235" y="25" class="tiny">Sync Lite</text>
    <rect x="285" y="0" width="95" height="38" rx="9" fill="#172554" stroke="#cbd5e1"/>
    <text x="332" y="25" class="tiny">Map-lite</text>
    <rect x="385" y="0" width="95" height="38" rx="9" fill="#172554" stroke="#cbd5e1"/>
    <text x="432" y="25" class="tiny">router</text>
  </g>

  <!-- footer caption -->
  <text x="700" y="600" text-anchor="middle" class="tiny">Generated visual map · private-first 공개 전략</text>

  <!-- connection markers -->
  <g fill="#22d3ee">
    <circle cx="257" cy="330" r="4"/>
    <circle cx="699" cy="320" r="4"/>
    <circle cx="1133" cy="330" r="4"/>
    <circle cx="700" cy="365" r="4"/>
    <circle cx="700" cy="520" r="4"/>
  </g>
  <line x1="257" y1="330" x2="555" y2="220" stroke="#67e8f9" stroke-width="2"/>
  <line x1="699" y1="320" x2="700" y2="275" stroke="#67e8f9" stroke-width="2"/>
  <line x1="1133" y1="330" x2="846" y2="220" stroke="#67e8f9" stroke-width="2"/>
  <line x1="700" y1="365" x2="700" y2="520" stroke="#fde047" stroke-width="2" opacity="0.9"/>
</svg>
