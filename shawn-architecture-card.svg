<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="650" viewBox="0 0 1400 650" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SHawn Public Architecture Card</title>
  <desc id="desc">Premium visual architecture card for SHawn public repositories</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0b1220" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="softGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="soft" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M0 27 H28 M28 0 V28" stroke="#1f2937" stroke-opacity="0.45" stroke-width="0.4"/>
    </pattern>

    <style>
      .title { font: 700 54px/1.08 'Inter','Segoe UI',Arial,sans-serif; fill: #f8fafc; }
      .sub { font: 500 23px/1.2 'Inter','Segoe UI',Arial,sans-serif; fill: #bfdbfe; }
      .section { font: 700 26px/1.2 'Inter','Segoe UI',Arial,sans-serif; fill: #e2e8f0; text-anchor: middle; }
      .copy { font: 500 14px/1.25 'Inter','Segoe UI',Arial,sans-serif; fill: #94a3b8; }
      .copyMid { font: 500 15px/1.25 'Inter','Segoe UI',Arial,sans-serif; fill: #cbd5e1; text-anchor: middle; }
      .tag { font: 600 12px/1.15 'Inter','Segoe UI',Arial,sans-serif; fill: #e2e8f0; text-anchor: middle; }
      .kpi { font: 700 28px/1.1 'Inter','Segoe UI',Arial,sans-serif; fill: #f8fafc; text-anchor: middle; }
      .kpiSub { font: 500 13px/1.1 'Inter','Segoe UI',Arial,sans-serif; fill: #94a3b8; text-anchor: middle; }
      .repo { font: 600 15px/1.2 'Inter','Segoe UI',Arial,sans-serif; fill: #f8fafc; text-anchor: middle; }
      .repoSub { font: 500 12px/1.2 'Inter','Segoe UI',Arial,sans-serif; fill: #cbd5e1; }
      .legend { font: 600 13px/1.2 'Inter','Segoe UI',Arial,sans-serif; fill: #f1f5f9; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="650" fill="url(#bg)"/>
  <rect x="0" y="0" width="1400" height="650" fill="url(#grid)"/>
  <rect x="40" y="26" width="1320" height="598" rx="30" fill="#ffffff06" stroke="url(#ring)" stroke-width="1.2"/>

  <ellipse cx="190" cy="150" rx="350" ry="170" fill="url(#softGlow)"/>
  <ellipse cx="1200" cy="530" rx="250" ry="120" fill="#8b5cf615"/>
  <g filter="url(#soft)">
    <ellipse cx="700" cy="170" rx="520" ry="96" fill="#38bdf810"/>
  </g>

  <text x="80" y="92" class="copy">SHAWN ECOSYSTEM · PUBLIC ARCHITECTURE</text>
  <text x="80" y="138" class="title">SHawn Public-Facing Map</text>
  <text x="80" y="178" class="sub">private 영역은 축소표기 · 공개 레포 중심으로만 구성</text>

  <g transform="translate(80 222)">
    <rect x="0" y="0" width="170" height="70" rx="15" fill="url(#panel)" stroke="#60a5fa" stroke-opacity="0.5"/>
    <text x="85" y="31" class="kpi">3</text>
    <text x="85" y="52" class="kpiSub">Public Zones</text>

    <rect x="194" y="0" width="188" height="70" rx="15" fill="url(#panel)" stroke="#22d3ee" stroke-opacity="0.5"/>
    <text x="288" y="31" class="kpi">8</text>
    <text x="288" y="52" class="kpiSub">Open Repos</text>

    <rect x="410" y="0" width="220" height="70" rx="15" fill="url(#panel)" stroke="#a78bfa" stroke-opacity="0.5"/>
    <text x="520" y="31" class="kpi">Evidence-driven</text>
    <text x="520" y="52" class="kpiSub">Boundary-first publication</text>
  </g>

  <g filter="url(#shadow)" transform="translate(330 320)">
    <rect x="0" y="0" width="260" height="205" rx="22" fill="url(#panel)" stroke="#34d399"/>
    <text x="130" y="42" class="section">SH Layer</text>
    <line x1="28" y1="60" x2="232" y2="60" stroke="#34d399" stroke-opacity="0.7"/>
    <rect x="20" y="78" width="220" height="50" rx="14" fill="#052e16"/>
    <text x="130" y="111" class="tag">Public Operations Surface</text>
    <text x="130" y="129" class="repoSub" text-anchor="middle">workflow policy · policy signals</text>

    <rect x="20" y="142" width="220" height="50" rx="14" fill="#14532d"/>
    <text x="130" y="175" class="tag">Execution Boundary</text>
    <text x="130" y="193" class="repoSub" text-anchor="middle">private internals intentionally omitted</text>
  </g>

  <g filter="url(#shadow)" transform="translate(570 320)">
    <rect x="0" y="0" width="260" height="205" rx="22" fill="url(#panel)" stroke="#f59e0b"/>
    <text x="130" y="42" class="section">SHio Layer</text>
    <line x1="28" y1="60" x2="232" y2="60" stroke="#f59e0b" stroke-opacity="0.7"/>
    <rect x="20" y="78" width="100" height="50" rx="14" fill="#7c2d12"/>
    <text x="70" y="111" class="tag">paper-assist</text>
    <rect x="138" y="78" width="112" height="50" rx="14" fill="#92400e"/>
    <text x="194" y="111" class="tag">paper-map</text>

    <rect x="20" y="142" width="230" height="50" rx="14" fill="#b45309"/>
    <text x="135" y="175" class="tag">academic-research</text>
  </g>

  <g filter="url(#shadow)" transform="translate(810 320)">
    <rect x="0" y="0" width="260" height="205" rx="22" fill="url(#panel)" stroke="#93c5fd"/>
    <text x="130" y="42" class="section">SHide Layer</text>
    <line x1="28" y1="60" x2="232" y2="60" stroke="#93c5fd" stroke-opacity="0.7"/>
    <rect x="20" y="78" width="70" height="50" rx="14" fill="#1e40af"/>
    <text x="55" y="111" class="tag">IG</text>
    <rect x="98" y="78" width="70" height="50" rx="14" fill="#2563eb"/>
    <text x="133" y="111" class="tag">YT</text>
    <rect x="176" y="78" width="84" height="50" rx="14" fill="#3b82f6"/>
    <text x="218" y="111" class="tag">BLOG</text>

    <rect x="20" y="142" width="230" height="50" rx="14" fill="#172554"/>
    <text x="135" y="175" class="tag">Growth distribution</text>
  </g>

  <rect x="210" y="556" width="980" height="62" rx="16" fill="#090f1f" stroke="#fde047"/>
  <text x="700" y="590" class="copyMid" text-anchor="middle">Public OSS Surface · Open Repository Index</text>

  <g transform="translate(236 565)">
    <rect x="0" y="-11" width="112" height="36" rx="11" fill="#111827" stroke="#93c5fd"/>
    <text x="56" y="13" class="repo">EvidenceMap</text>

    <rect x="122" y="-11" width="120" height="36" rx="11" fill="#111827" stroke="#a78bfa"/>
    <text x="182" y="13" class="repo">SHawn-hwp</text>

    <rect x="250" y="-11" width="148" height="36" rx="11" fill="#111827" stroke="#22d3ee"/>
    <text x="324" y="13" class="repo">paper-map-lite</text>

    <rect x="406" y="-11" width="132" height="36" rx="11" fill="#111827" stroke="#34d399"/>
    <text x="472" y="13" class="repo">shawn-docx-qa</text>

    <rect x="546" y="-11" width="148" height="36" rx="11" fill="#111827" stroke="#f97316"/>
    <text x="620" y="13" class="repo">shawn-sync-lite</text>

    <rect x="702" y="-11" width="124" height="36" rx="11" fill="#111827" stroke="#0ea5e9"/>
    <text x="764" y="13" class="repo">newbrain-router</text>

    <rect x="834" y="-11" width="165" height="36" rx="11" fill="#111827" stroke="#facc15"/>
    <text x="916" y="13" class="repo">shawn-bio-search-lite</text>
  </g>

  <text x="80" y="630" class="copy">Boundary-safe structure · Internal systems excluded</text>

  <line x1="440" y1="425" x2="570" y2="425" stroke="url(#ring)" stroke-width="2.1" opacity="0.7"/>
  <line x1="570" y1="425" x2="810" y2="425" stroke="url(#ring)" stroke-width="2.1" opacity="0.7"/>
  <line x1="810" y1="425" x2="960" y2="425" stroke="url(#ring)" stroke-width="2.1" opacity="0.7"/>

  <circle cx="560" cy="425" r="5" fill="#67e8f9"/>
  <circle cx="810" cy="425" r="5" fill="#f9a8d4"/>
  <circle cx="960" cy="425" r="5" fill="#a78bfa"/>

  <circle cx="90" cy="130" r="5" fill="#67e8f9"/>
  <circle cx="1400" cy="180" r="4" fill="#a78bfa"/>
  <circle cx="1300" cy="590" r="4" fill="#67e8f9"/>
</svg>
